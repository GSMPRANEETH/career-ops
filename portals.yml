# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.

title_filter:
  positive:
    - "Software Engineer"
    - "Full Stack Developer"
    - "Backend Engineer"
    - "Frontend Engineer"
    - "AI Engineer"
    - "LLM Engineer"
    - "Machine Learning Engineer"
    - "New Grad"
    - "Junior"
  negative:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Director"
    - "Manager"

search_queries:
  # -- India Specific --
  - name: Google Search — AI Engineer India
    query: '"AI Engineer" OR "Software Engineer" (Bangalore OR Hyderabad OR Pune OR Remote) India'
    enabled: true
  - name: Greenhouse — India Tech
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Software Engineer" (Bangalore OR India OR Remote)'
    enabled: true
  - name: Ashby — India Tech
    query: 'site:jobs.ashbyhq.com "Software Engineer" (Bangalore OR India OR Remote)'
    enabled: true

  # -- Remote Global --
  - name: RemoteOK — AI/Web
    query: 'site:remoteok.com "AI Engineer" OR "Software Engineer" junior OR "new grad"'
    enabled: true
  - name: WeWorkRemotely — Engineering
    query: 'site:weworkremotely.com "Software Engineer" OR "Developer"'
    enabled: true

tracked_companies:
  - name: Google India
    careers_url: https://www.google.com/about/careers/applications/jobs/results/?location=India
    scan_method: websearch
    enabled: true
  - name: Microsoft India
    careers_url: https://careers.microsoft.com/v2/global/en/home.html
    scan_method: websearch
    scan_query: 'site:careers.microsoft.com "Software Engineer" India'
    enabled: true
  - name: Razorpay
    careers_url: https://razorpay.com/jobs/
    scan_method: websearch
    enabled: true
  - name: Zomato
    careers_url: https://www.zomato.com/careers
    scan_method: websearch
    enabled: true
  - name: Swiggy
    careers_url: https://www.swiggy.com/careers
    scan_method: websearch
    enabled: true
